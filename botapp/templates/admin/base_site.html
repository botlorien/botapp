{% extends "admin/base_site.html" %}
{% load static %}

{% block title %}RPA | Admin{% endblock %}

{% block extrastyle %}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'admin/css/custom.css' %}">
{% endblock %}

{% block branding %}
<div class="fx-brand">
  <a href="{% url 'bot_list' %}" class="fx-brand-link">
    <div class="fx-brand-icon">
      <i class="bi bi-cpu-fill"></i>
    </div>
    <span id="site-name" class="fx-brand-name">RPA | Admin</span>
  </a>

  <nav class="fx-brand-nav">
    <a href="{% url 'dashboard' %}" class="fx-nav-link">
      <i class="bi bi-speedometer2"></i>
      <span>Dashboard</span>
    </a>
    <a href="{% url 'bot_list' %}" class="fx-nav-link">
      <i class="bi bi-robot"></i>
      <span>Bots</span>
    </a>
    {% if user.is_authenticated %}
    <form action="{% url 'logout' %}" method="post" class="fx-logout-form">
      {% csrf_token %}
      <button type="submit" class="fx-nav-link fx-logout-btn" title="Sair">
        <i class="bi bi-box-arrow-right"></i>
        <span>Sair</span>
      </button>
    </form>
    {% endif %}
  </nav>
</div>
{% endblock %}

{% block extrahead %}
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      document.body.classList.add("fx-admin");
    });
  </script>
{% endblock %}
